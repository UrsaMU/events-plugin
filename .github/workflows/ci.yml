name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    name: Type-check, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Cache dependencies
        run: |
          deno cache index.ts tests/*.ts
          deno cache https://jsr.io/@ursamu/ursamu/2.3.0/src/services/Softcode/softcode-worker.ts

      - name: Type check
        run: deno check index.ts

      - name: Lint
        run: deno lint

      - name: Test
        run: deno task test

      - name: Dry-run publish
        run: deno publish --dry-run --allow-dirty
